name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: English-only check (tracked files)
        run: ./scripts/check-english.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -warnaserror

      - name: Test (unit, fast)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=Integration"

      - name: Test (integration)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Integration"

  # Expanded in MEMP-015: dotnet format --verify-no-changes, vulnerable-package check,
  # and the multi-arch Home Assistant add-on build (GHCR).
