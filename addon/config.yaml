name: Memory MCP
version: "0.23.0"
slug: memory_mcp
description: Shared memory / notes / skills data-plane (MCP) for Home Assistant agents.
url: https://github.com/MaxMinsk/HomeMemory/tree/main/addon
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
image: ghcr.io/maxminsk/homememory
webui: "http://[HOST]:[PORT:8099]/ui"
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": MCP endpoint (/mcp) + read-only viewer (/ui), bearer-protected
options:
  db_path: "/data/memory.sqlite"
  bearer_token: ""
  allowed_domains: ""
  log_level: "Information"
  public_base_url: ""
  artifact_signing_key: ""
schema:
  db_path: str
  bearer_token: password?
  allowed_domains: str?
  log_level: list(Trace|Debug|Information|Warning|Error)
  public_base_url: str?
  artifact_signing_key: password?
