name: Memory MCP
version: "0.50.0"
slug: memory_mcp
description: Shared memory / notes / skills data-plane (MCP) for Home Assistant agents.
url: https://github.com/MaxMinsk/HomeMemory/tree/main/addon
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
# Cold backup: the Supervisor stops the add-on for the duration of a backup so the SQLite
# database (WAL mode) and the blob store under /data are captured as a consistent snapshot,
# rather than hot-copied while connections are open. Brief downtime during backups only.
backup: cold
image: ghcr.io/maxminsk/homememory
webui: "http://[HOST]:[PORT:8099]/ui"
# Supervisor pings this unauthenticated liveness probe; a failure restarts the add-on.
watchdog: "http://[HOST]:[PORT:8099]/health"
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": MCP endpoint (/mcp) + read-only viewer (/ui), bearer-protected
options:
  db_path: "/data/memory.sqlite"
  bearer_token: ""
  allowed_domains: ""
  log_level: "Information"
  public_base_url: ""
  artifact_signing_key: ""
  mqtt_enabled: false
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "memory"
schema:
  db_path: str
  bearer_token: password?
  allowed_domains: str?
  log_level: list(Trace|Debug|Information|Warning|Error)
  public_base_url: str?
  artifact_signing_key: password?
  mqtt_enabled: bool
  mqtt_host: str?
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str?
