<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memory MCP — viewer</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#e6e9ef; --muted:#8b93a7; --accent:#6ea8fe; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; gap:12px; align-items:center; padding:10px 14px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; }
  header b { color:var(--accent); }
  #stats { color:var(--muted); font-size:12px; margin-left:auto; white-space:pre; }
  main { display:grid; grid-template-columns: 360px 1fr; height: calc(100vh - 52px); }
  #left { border-right:1px solid var(--line); overflow:auto; }
  #filters { display:flex; flex-wrap:wrap; gap:6px; padding:10px; border-bottom:1px solid var(--line); }
  #filters input, #filters select { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px; }
  #filters input[type=text]{ flex:1; min-width:120px; }
  button { background:var(--accent); color:#08101f; border:0; border-radius:6px; padding:6px 12px; font-weight:600; cursor:pointer; }
  .btn-reject { background:#3a2330; color:#e0a0b0; }
  .fld { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px; }
  .item { padding:9px 12px; border-bottom:1px solid var(--line); cursor:pointer; }
  .item:hover { background:#1d2230; }
  .item .t { font-weight:600; }
  .item .m { color:var(--muted); font-size:12px; }
  .badge { display:inline-block; background:#222838; color:var(--muted); border-radius:4px; padding:0 6px; font-size:11px; margin-right:4px; }
  .grouphdr { padding:6px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); background:#13161d; border-bottom:1px solid var(--line); position:sticky; top:0; }
  .finding { border-left:3px solid var(--line); }
  .finding.sev-warn { border-left-color:#c9893f; }
  .finding.sev-info { border-left-color:#4f8fc0; }
  #detail { overflow:auto; padding:16px 20px; }
  #detail h2 { margin:0 0 4px; }
  pre { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
  .k { color:var(--muted); }
  .meta { margin:3px 0; }
  .lbl { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-right:6px; }
  .tag { display:inline-block; background:#1f3556; color:#9cc4ff; border-radius:4px; padding:0 7px; font-size:12px; margin:0 5px 3px 0; cursor:pointer; }
  .tag:hover { background:#2a4d82; color:#cfe1ff; }
  a { color:var(--accent); }
  .empty { color:var(--muted); padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <b>Memory MCP</b> <span class="k">viewer</span>
  <span id="stats"></span>
  <button onclick="admin()" title="Owner maintenance (root token)" style="background:#222838;color:var(--muted);margin-left:10px">admin</button>
  <button onclick="logout()" style="background:#222838;color:var(--muted);margin-left:8px">logout</button>
</header>
<main>
  <div id="left">
    <div id="filters">
      <input type="text" id="q" placeholder="full-text query" />
      <select id="type"><option value="">any type</option></select>
      <select id="domain"><option value="">any domain</option></select>
      <select id="status" title="envelope status">
        <option value="active" selected>active</option>
        <option value="archived">archived</option>
        <option value="superseded">superseded</option>
      </select>
      <input type="text" id="tag" placeholder="tag (e.g. loc:summer-kitchen)" />
      <button onclick="search()">Search</button>
      <button onclick="inbox()" title="Review queue: lint findings (unstructured / stale / possible secret / no tags / duplicate / broken link)" style="background:#3a2f12;color:#e0c074">Inbox</button>
    </div>
    <div id="list"><div class="empty">Enter token, then Search.</div></div>
  </div>
  <div id="detail"><div class="empty">Select a note.</div></div>
</main>
<script>
const $ = s => document.querySelector(s);
let token = localStorage.getItem('memtoken') || '';
if (!token) { token = prompt('Bearer token:') || ''; if (token) localStorage.setItem('memtoken', token); }
const PAGE = 50;
let offset = 0;

async function api(path) {
  const r = await fetch(path, { headers: { 'Authorization': 'Bearer ' + token } });
  if (r.status === 401) { localStorage.removeItem('memtoken'); throw new Error('401 — bad token, reload to re-enter'); }
  if (!r.ok) throw new Error(r.status + ' ' + (await r.text()).slice(0,200));
  return r.json();
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function logout(){ localStorage.removeItem('memtoken'); location.hash=''; location.reload(); }

// Click any tag chip (list or detail) to filter the search by that tag. Capture phase so it wins
// over the surrounding list item's open handler before that fires.
function tagSearch(tag){ $('#tag').value = tag; $('#left').scrollTop = 0; search(); }
document.addEventListener('click', e => {
  const chip = e.target.closest('.tag');
  if (chip && chip.dataset.tag) { e.stopPropagation(); tagSearch(chip.dataset.tag); }
}, true);

const FIELDS = [['q','#q'],['type','#type'],['domain','#domain'],['status','#status'],['tag','#tag']];
function writeHash(){
  const p = new URLSearchParams();
  for (const [k,id] of FIELDS){ const v=$(id).value; if (v && !(k==='status'&&v==='active')) p.set(k,v); }
  if ($('#detail').dataset.sel) p.set('sel', $('#detail').dataset.sel);
  history.replaceState(null,'','#'+p.toString());
}
function readHash(){
  const p = new URLSearchParams(location.hash.slice(1));
  for (const [k,id] of FIELDS){ if (p.has(k)) $(id).value = p.get(k); }
  return p.get('sel');
}

async function loadStats() {
  try {
    const s = await api('/api/stats');
    const archived = (s.notesByStatus && s.notesByStatus.archived) || 0;
    const dbMb = (Number(s.dbSizeBytes||0)/1048576).toFixed(1);
    $('#stats').textContent = `${s.noteCount} active · ` + Object.entries(s.notesByType).map(([k,v])=>`${k} ${v}`).join('  ') +
      `  · ${s.attachmentCount} attach` + (archived ? `  · ${archived} archived` : '') + `  · db ${dbMb} MB`;
    const fill = (id, counts) => { const sel=$(id); Object.keys(counts).sort().forEach(k => { const o=document.createElement('option'); o.value=k; o.textContent=`${k} (${counts[k]})`; sel.appendChild(o); }); };
    fill('#type', s.notesByType);
    fill('#domain', s.notesByDomain || {});
  } catch(e){ $('#stats').textContent = e.message; }
}

function itemHtml(it){
  let tags = []; try { tags = it.tagsJson ? JSON.parse(it.tagsJson) : []; } catch {}
  return `<div class="item" onclick="open_('${it.id}')"><div class="t">${esc(it.title)||'<i>untitled</i>'}</div>` +
    `<div class="m"><span class="badge">${esc(it.type)}</span><span class="badge">${esc(it.domain)}</span>${esc(it.status||'')}</div>` +
    (tags.length ? `<div>${tags.map(t=>`<span class="tag" data-tag="${esc(t)}" title="filter by this tag">${esc(t)}</span>`).join('')}</div>` : '') + `</div>`;
}

async function search(reset=true) {
  if (reset) offset = 0;
  const p = new URLSearchParams();
  if ($('#q').value) p.set('q', $('#q').value);
  if ($('#type').value) p.set('type', $('#type').value);
  if ($('#domain').value) p.set('domain', $('#domain').value);
  if ($('#status').value) p.set('status', $('#status').value);
  if ($('#tag').value) p.set('tags', $('#tag').value);
  p.set('limit', String(PAGE)); p.set('offset', String(offset));
  const list = $('#list');
  try {
    const page = await api('/api/search?' + p.toString());
    const more = $('#more'); if (more) more.remove();
    const html = page.items.map(itemHtml).join('');
    if (reset) list.innerHTML = page.items.length ? html : '<div class="empty">No matches.</div>';
    else list.insertAdjacentHTML('beforeend', html);
    offset += page.items.length;
    if (page.hasMore) list.insertAdjacentHTML('beforeend',
      `<div class="item" id="more" style="text-align:center;color:var(--accent)" onclick="search(false)">Load more (${offset}/${page.total})</div>`);
    writeHash();
  } catch(e){ list.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

// Friendly labels for lint rules (the snake_case rule is the real axis; severity was just noise).
const RULE_LABEL = { no_tags:'No tags', no_dedup_key:'No dedup key', no_title:'No title',
  duplicate:'Possible duplicate', broken_link:'Broken link', stale_unstructured:'Stale (unstructured)',
  stale_unverified:'Stale (unverified)', oversized_no_summary:'Oversized, no summary', possible_secret:'Possible secret' };

// Memory inbox: open evolution suggestions to review, then lint findings grouped by rule. Each row opens the note.
async function inbox() {
  const dom = $('#domain').value;
  const list = $('#list');
  try {
    const sp = new URLSearchParams(); sp.set('type','memory_evolution_suggestion'); sp.set('filter', "payload.status == 'open'");
    if (dom) sp.set('domain', dom);
    const sug = await api('/api/search?' + sp.toString());
    const sugHtml = sug.items.length
      ? `<div class="grouphdr">suggestions to review · ${sug.items.length}</div>` + sug.items.map(itemHtml).join('') : '';

    const findings = await api('/api/lint' + (dom ? '?domain=' + encodeURIComponent(dom) : ''));
    const more = $('#more'); if (more) more.remove();
    const groups = {};
    for (const f of findings) (groups[f.rule] = groups[f.rule] || []).push(f);
    const lintHtml = Object.keys(groups).sort().map(rule => {
      const rows = groups[rule].map(f =>
        `<div class="item finding sev-${esc(f.severity)}" onclick="open_('${f.noteId}')"><div class="t">${esc(f.title)||'<i>untitled</i>'}</div>` +
        `<div class="m"><span class="badge">${esc(f.domain)}</span><span class="badge">${esc(f.type)}</span> ${esc(f.message)}</div></div>`).join('');
      return `<div class="grouphdr">${esc(RULE_LABEL[rule]||rule)} · ${groups[rule].length}</div>${rows}`;
    }).join('');

    list.innerHTML = (sugHtml + lintHtml) || '<div class="empty">Inbox clear — nothing to review.</div>';
  } catch(e){ list.innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

// Owner maintenance panel (root token only): run the CLI ops from the UI. Dry-run first, then Apply.
function admin() {
  $('#detail').innerHTML =
    `<h2>Admin / maintenance</h2>` +
    `<p class="k">Root (all-domains) token only. Run a dry-run first, then Apply.</p>` +
    `<div class="meta"><b>Normalize identifiers</b> <span class="k">— lowercase legacy domain/type/tags (e.g. Home → home)</span><br>` +
    `<button onclick="adminRun('normalize-identifiers',false)">Dry-run</button> ` +
    `<button class="btn-reject" onclick="adminRun('normalize-identifiers',true)">Apply</button></div>` +
    `<div class="meta"><b>GC blobs</b> <span class="k">— delete orphan content-addressed blobs</span><br>` +
    `<button onclick="adminRun('gc-blobs',false)">Dry-run</button> ` +
    `<button class="btn-reject" onclick="adminRun('gc-blobs',true)">Apply</button></div>` +
    `<h3>output</h3><pre id="adminout" class="k">—</pre>` +
    `<h3>Tokens</h3>` +
    `<div class="meta"><input id="tlabel" class="fld" type="text" placeholder="label (optional)"> ` +
    `<input id="tdomains" class="fld" type="text" placeholder="domains, e.g. kitchen,home or *"> ` +
    `<button onclick="tokenAdd()">Create</button> ` +
    `<button onclick="tokensLoad()" style="background:#222838;color:var(--muted)">Refresh</button></div>` +
    `<pre id="tokenout" class="k">—</pre><div id="tokenlist"></div>`;
  tokensLoad();
}
async function tokensLoad() {
  const el = $('#tokenlist'); if (!el) return;
  try {
    const r = await fetch('/api/admin/tokens', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 403) { el.innerHTML = '<div class="k">403 — requires the root (all-domains) token.</div>'; return; }
    if (!r.ok) throw new Error(r.status);
    const list = await r.json();
    el.innerHTML = list.length ? list.map(t =>
      `<div class="item"><div class="t">${esc(t.label||'(no label)')} <span class="badge">${esc(t.domains)}</span></div>` +
      `<div class="m">${esc(t.id)} · ${t.revokedUtc ? 'revoked' : 'active'}` +
      (t.revokedUtc ? '' : ` · <a href="#" onclick="tokenRevoke('${esc(t.id)}');return false">revoke</a>`) + `</div></div>`).join('')
      : '<div class="k">No tokens.</div>';
  } catch(e){ el.innerHTML = '<div class="k">'+esc(e.message)+'</div>'; }
}
async function tokenAdd() {
  const out = $('#tokenout');
  try {
    const r = await fetch('/api/admin/tokens', { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/json' },
      body: JSON.stringify({ label: $('#tlabel').value, domains: $('#tdomains').value }) });
    if (r.status === 403) { out.textContent = '403 — requires the root (all-domains) token.'; return; }
    if (!r.ok) throw new Error(r.status + ' ' + (await r.text()).slice(0,200));
    const d = await r.json();
    out.textContent = 'TOKEN (copy now — shown once):\n' + d.token + '\n\n' + JSON.stringify(d.record, null, 2);
    $('#tlabel').value=''; $('#tdomains').value=''; tokensLoad();
  } catch(e){ out.textContent = e.message; }
}
async function tokenRevoke(id) {
  if (!confirm('Revoke token ' + id + '?')) return;
  try {
    const r = await fetch('/api/admin/tokens/' + id + '/revoke', { method:'POST', headers:{ 'Authorization':'Bearer '+token } });
    if (!r.ok) throw new Error(r.status);
    tokensLoad();
  } catch(e){ alert(e.message); }
}
async function adminRun(op, apply) {
  if (apply && !confirm('Apply "' + op + '"? This writes to the database.')) return;
  const out = $('#adminout'); if (out) out.textContent = 'running…';
  try {
    const r = await fetch('/api/admin/' + op + '?apply=' + apply, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 403) { out.textContent = '403 — requires the root (all-domains) token.'; return; }
    if (!r.ok) throw new Error(r.status + ' ' + (await r.text()).slice(0,300));
    out.textContent = JSON.stringify(await r.json(), null, 2);
  } catch(e){ out.textContent = e.message; }
}

// Apply/reject a memory_evolution_suggestion (the viewer's only write action). Refreshes detail + list.
async function reviewSuggestion(id, action) {
  if (!confirm(action === 'apply' ? 'Apply this suggestion to its target note?' : 'Reject this suggestion?')) return;
  try {
    const r = await fetch('/api/suggestions/' + id + '/' + action, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) throw new Error(r.status + ' ' + (await r.text()).slice(0,200));
    await open_(id);  // status is now applied/rejected
    await search();   // refresh the list
  } catch(e){ alert(e.message); }
}

async function open_(id) {
  try {
    const d = await api('/api/notes/' + id);
    const n = d.note;
    let payload = '', pobj = {};
    if (n.payloadJson) { try { pobj = JSON.parse(n.payloadJson); payload = JSON.stringify(pobj, null, 2); } catch { payload = n.payloadJson; } }
    const canReview = n.type === 'memory_evolution_suggestion' && pobj.status === 'open';
    const tags = n.tagsJson ? JSON.parse(n.tagsJson) : [];
    const atts = (d.attachments||[]).map(a => `<li><a href="${esc(a.url)}" target="_blank">${esc(a.filename||a.sha256.slice(0,12))}</a> <span class="k">${esc(a.contentType||'')} · ${a.sizeBytes}b</span></li>`).join('');
    const linkLi = l => `<li><span class="k">${l.direction==='out'?'→':'←'} ${esc(l.rel)}</span> <a href="#" onclick="open_('${l.noteId}');return false">${esc(l.title)||esc(l.noteId.slice(0,8))}</a> <span class="k">(${esc(l.type)})</span></li>`;
    const outs = (d.links||[]).filter(l => l.direction === 'out');
    const ins  = (d.links||[]).filter(l => l.direction === 'in');
    const linkSection = (label, arr) => arr.length ? `<h3>${label}</h3><ul>${arr.map(linkLi).join('')}</ul>` : '';
    $('#detail').innerHTML =
      `<h2>${esc(n.title)||'<i>untitled</i>'}</h2>` +
      `<div class="meta"><span class="lbl">domain</span>${esc(n.domain)}` +
      `&nbsp;&nbsp;<span class="lbl">type</span>${esc(n.type)}` +
      `&nbsp;&nbsp;<span class="lbl">status</span>${esc(n.status)}</div>` +
      (canReview ? `<div class="meta"><button onclick="reviewSuggestion('${esc(id)}','apply')">Apply</button> ` +
        `<button class="btn-reject" onclick="reviewSuggestion('${esc(id)}','reject')">Reject</button></div>` : '') +
      `<div class="meta"><span class="lbl">tags</span>${tags.length ? tags.map(t=>`<span class="tag" data-tag="${esc(t)}" title="filter by this tag">${esc(t)}</span>`).join('') : '<i class="k">none</i>'}</div>` +
      `<p class="k">key: ${esc(n.dedupKey||'—')} · updated: ${esc(n.updatedUtc)} · by: ${esc(n.sourceAgent||'—')}</p>` +
      (payload ? `<h3>payload</h3><pre>${esc(payload)}</pre>` : '') +
      (n.body ? `<h3>body</h3><pre>${esc(n.body)}</pre>` : '') +
      linkSection('outgoing links', outs) +
      linkSection('incoming links (backlinks)', ins) +
      (atts ? `<h3>attachments</h3><ul>${atts}</ul>` : '');
    $('#detail').dataset.sel = id; writeHash();
  } catch(e){ $('#detail').innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; }
}

async function init() {
  await loadStats();          // populates type/domain option lists first
  const sel = readHash();     // then restore filters from the URL
  await search();
  if (sel) open_(sel);
}
init();
</script>
</body>
</html>
